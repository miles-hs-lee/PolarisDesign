name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `changeset status --since=origin/main` can
          # diff against the base branch on PRs.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build @polaris/ui
        run: pnpm --filter @polaris/ui build

      - name: Verify token sync (tokens.css matches generator output)
        # `pnpm --filter @polaris/ui build` runs `build:tokens` first.
        # If the committed tokens.css drifts from what the script produces,
        # this step fails — forcing the contributor to commit the regen.
        run: git diff --exit-code packages/ui/src/styles/tokens.css || (echo "::error::tokens.css is out of sync — run 'pnpm --filter @polaris/ui build:tokens' and commit the result" && exit 1)

      - name: Verify DESIGN.md sync (Stitch spec matches generator output)
        # build also runs `build:design-md`. Same drift-detection as
        # tokens.css — DESIGN.md is auto-generated from tokens.ts.
        run: git diff --exit-code DESIGN.md || (echo "::error::DESIGN.md is out of sync — run 'pnpm --filter @polaris/ui build:design-md' and commit the result" && exit 1)

      - name: Verify root version sync
        # Root package.json isn't in the changesets fixed group (it's not
        # a workspace member), so we sync it via a post-version script.
        # This guards against a release that forgot to run that script.
        run: node scripts/sync-root-version.mjs --check

      - name: Build @polaris/lint
        run: pnpm --filter @polaris/lint build

      - name: Typecheck (all packages)
        run: pnpm -r typecheck

      - name: Test — @polaris/ui
        run: pnpm --filter @polaris/ui test

      - name: Test — @polaris/lint rules
        run: pnpm --filter @polaris/lint test

      - name: Test — @polaris/plugin hook
        run: pnpm --filter @polaris/plugin test

      - name: Lint — demo (showcase, warnings allowed)
        # demo is the local sandbox, not an npm package. Many warnings are
        # legitimate lucide chrome icons (Menu, Save, Bell, …). Errors
        # still fail. To raise to 0-warnings later, swap or per-line-disable
        # in each demo page and add `--max-warnings=0` here.
        run: pnpm --filter demo lint

      - name: Lint — template-next (must be 0 warnings)
        # template-next is an npm-published starter — kept strict so it
        # ships clean. The package.json `lint` script enforces
        # `--max-warnings=0`.
        run: pnpm --filter polaris-template-next lint

      - name: Build — demo
        run: pnpm --filter demo build

      - name: Build — template-next
        run: pnpm --filter polaris-template-next build

      - name: Verify changeset / version sync
        # If a changeset file is present, this PR will bump versions on
        # release. Surfaces the planned bump in the CI log so reviewers
        # see what's about to ship. Fails if the `since` ref isn't
        # reachable (caller must use fetch-depth: 0) — silent skip would
        # let release-time surprises slip through.
        # Skipped on direct pushes to main (no base to diff against).
        if: github.event_name == 'pull_request'
        run: pnpm changeset status --since=origin/${{ github.base_ref }}
