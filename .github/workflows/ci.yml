name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build @polaris/ui
        run: pnpm --filter @polaris/ui build

      - name: Verify token sync (tokens.css matches generator output)
        # `pnpm --filter @polaris/ui build` runs `build:tokens` first.
        # If the committed tokens.css drifts from what the script produces,
        # this step fails — forcing the contributor to commit the regen.
        run: git diff --exit-code packages/ui/src/styles/tokens.css || (echo "::error::tokens.css is out of sync — run 'pnpm --filter @polaris/ui build:tokens' and commit the result" && exit 1)

      - name: Build @polaris/lint
        run: pnpm --filter @polaris/lint build

      - name: Typecheck (all packages)
        run: pnpm -r typecheck

      - name: Test — @polaris/ui
        run: pnpm --filter @polaris/ui test

      - name: Test — @polaris/lint rules
        run: pnpm --filter @polaris/lint test

      - name: Test — @polaris/plugin hook
        run: pnpm --filter @polaris/plugin test

      - name: Lint — demo (must be 0 violations)
        run: pnpm --filter demo lint

      - name: Lint — template-next (must be 0 violations)
        run: pnpm --filter polaris-template-next lint

      - name: Build — demo
        run: pnpm --filter demo build

      - name: Build — template-next
        run: pnpm --filter polaris-template-next build

      - name: Verify changeset / version sync
        # If a changeset file is present, this PR will bump versions on
        # release. We surface the planned bump in the CI log so reviewers
        # see what's about to ship; not a hard fail.
        run: pnpm changeset status --since=origin/main || true
